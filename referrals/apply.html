<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-W67DT0DWHT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-W67DT0DWHT');
    </script>
    <!-- Apply saved theme immediately to prevent flash -->
    <script>
      (function() {
        var theme = localStorage.getItem('theme');
        if (theme === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply to Partner Program | Shaminder.sg</title>
    <meta name="description" content="Apply to become a referral partner at Shaminder.sg. Fill out the form and start earning 10% commission on every successful referral.">
    <link rel="canonical" href="https://shaminder.sg/referrals/apply.html">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Form Section */
        .form-section {
            padding: 120px 0 80px;
        }

        .form-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .form-header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-white);
        }

        .form-header p {
            color: var(--text-gray);
        }

        .form-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-white);
            font-size: 14px;
        }

        .form-group label span {
            color: var(--neon-pink);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            background: var(--bg-dark);
            color: var(--text-white);
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 0 3px rgba(0, 245, 255, 0.1);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-muted);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-group select {
            cursor: pointer;
        }

        .form-group select option {
            background: var(--bg-dark);
            color: var(--text-white);
        }

        .password-field {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
        }

        .password-toggle:hover {
            color: var(--neon-cyan);
        }

        .password-strength {
            margin-top: 8px;
            font-size: 12px;
        }

        .password-strength .bar {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin-bottom: 4px;
            overflow: hidden;
        }

        .password-strength .bar-fill {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
        }

        .strength-weak .bar-fill { width: 33%; background: var(--neon-pink); }
        .strength-medium .bar-fill { width: 66%; background: var(--neon-orange); }
        .strength-strong .bar-fill { width: 100%; background: var(--neon-green); }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #22d3ee, #67e8f9);
            color: #000;
            box-shadow: 0 4px 20px rgba(34, 211, 238, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #67e8f9, #a5f3fc);
            box-shadow: 0 6px 30px rgba(34, 211, 238, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .form-footer {
            text-align: center;
            margin-top: 24px;
            color: var(--text-gray);
            font-size: 14px;
        }

        .form-footer a {
            color: var(--neon-cyan);
            text-decoration: none;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        /* Success/Error Messages */
        .message {
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 24px;
            display: none;
        }

        .message.success {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: var(--neon-green);
        }

        .message.error {
            background: rgba(255, 0, 170, 0.1);
            border: 1px solid rgba(255, 0, 170, 0.3);
            color: var(--neon-pink);
        }

        .message.show {
            display: block;
        }

        /* Terms Checkbox */
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--neon-cyan);
            margin-top: 2px;
            flex-shrink: 0;
        }

        .checkbox-group label {
            font-size: 13px;
            color: var(--text-gray);
            cursor: pointer;
        }

        .checkbox-group label a {
            color: var(--neon-cyan);
        }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .form-card {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <section class="form-section">
        <div class="container">
            <div class="form-header">
                <h1>Become a Partner</h1>
                <p>Fill out the form below to apply for our referral program.</p>
            </div>

            <div class="form-card">
                <div id="message" class="message"></div>

                <form id="applyForm" onsubmit="submitApplication(event)">
                    <div class="form-group">
                        <label for="name">Full Name <span>*</span></label>
                        <input type="text" id="name" name="name" required placeholder="John Doe">
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address <span>*</span></label>
                        <input type="email" id="email" name="email" required placeholder="john@example.com">
                    </div>

                    <div class="form-group">
                        <label for="password">Create Password <span>*</span></label>
                        <div class="password-field">
                            <input type="password" id="password" name="password" required placeholder="Min. 8 characters" minlength="8" oninput="checkPasswordStrength()">
                            <button type="button" class="password-toggle" onclick="togglePassword()">
                                <svg id="eyeIcon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                            </button>
                        </div>
                        <div id="passwordStrength" class="password-strength">
                            <div class="bar"><div class="bar-fill"></div></div>
                            <span id="strengthText"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number <span>*</span></label>
                        <input type="tel" id="phone" name="phone" required placeholder="+65 9123 4567">
                    </div>

                    <div class="form-group">
                        <label for="company">Company/Organization</label>
                        <input type="text" id="company" name="company" placeholder="Your company name (optional)">
                    </div>

                    <div class="form-group">
                        <label for="promotion">How will you promote? <span>*</span></label>
                        <select id="promotion" name="promotion" required>
                            <option value="">Select an option</option>
                            <option value="social_media">Social Media</option>
                            <option value="blog_website">Blog/Website</option>
                            <option value="email_list">Email List</option>
                            <option value="word_of_mouth">Word of Mouth</option>
                            <option value="business_network">Business Network</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="notes">Additional Notes</label>
                        <textarea id="notes" name="notes" placeholder="Tell us more about yourself or how you plan to promote..."></textarea>
                    </div>

                    <div class="form-group">
                        <div class="checkbox-group">
                            <input type="checkbox" id="terms" name="terms" required>
                            <label for="terms">I agree to the <a href="../terms-of-service.html" target="_blank">Terms of Service</a> and <a href="../privacy-policy.html" target="_blank">Privacy Policy</a></label>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="btn btn-primary">
                        <span id="btnText">Submit Application</span>
                        <div id="btnSpinner" class="spinner" style="display: none;"></div>
                    </button>
                </form>

                <div class="form-footer">
                    Already a partner? <a href="login.html">Login here</a>
                </div>
            </div>
        </div>
    </section>

    <script src="../shared-header.js?v=2.4"></script>
    <script src="../shared-footer.js"></script>

    <script>
        // Referral Partner API Configuration
        const REFERRAL_API_URL = 'https://script.google.com/macros/s/AKfycbwq9tII7H8_QLJ5TnbLgm2K01NGLzki8-YGd-SaJSSvLYVHCD8Xth95-Pu8yErnqiFp/exec';
        const SALT = 'shaminder_referral_2026';

        // SHA256 Hash Function
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Toggle Password Visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
            }
        }

        // Check Password Strength
        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthDiv = document.getElementById('passwordStrength');
            const strengthText = document.getElementById('strengthText');

            strengthDiv.classList.remove('strength-weak', 'strength-medium', 'strength-strong');

            if (password.length === 0) {
                strengthText.textContent = '';
                return;
            }

            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            if (strength <= 1) {
                strengthDiv.classList.add('strength-weak');
                strengthText.textContent = 'Weak password';
                strengthText.style.color = 'var(--neon-pink)';
            } else if (strength <= 2) {
                strengthDiv.classList.add('strength-medium');
                strengthText.textContent = 'Medium password';
                strengthText.style.color = 'var(--neon-orange)';
            } else {
                strengthDiv.classList.add('strength-strong');
                strengthText.textContent = 'Strong password';
                strengthText.style.color = 'var(--neon-green)';
            }
        }

        // Show Message
        function showMessage(type, text) {
            const messageEl = document.getElementById('message');
            messageEl.className = 'message ' + type + ' show';
            messageEl.textContent = text;
            messageEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // Submit Application
        async function submitApplication(event) {
            event.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');

            // Disable button and show loading
            submitBtn.disabled = true;
            btnText.textContent = 'Submitting...';
            btnSpinner.style.display = 'block';

            try {
                const formData = {
                    name: document.getElementById('name').value.trim(),
                    email: document.getElementById('email').value.trim().toLowerCase(),
                    password: await sha256(document.getElementById('password').value + SALT),
                    phone: document.getElementById('phone').value.trim(),
                    company: document.getElementById('company').value.trim(),
                    promotion: document.getElementById('promotion').value,
                    notes: document.getElementById('notes').value.trim()
                };

                // Check if API is configured
                if (REFERRAL_API_URL.includes('YOUR_DEPLOYMENT_ID')) {
                    // Demo mode - store locally
                    const partners = JSON.parse(localStorage.getItem('referral_partners') || '[]');

                    // Check if email already exists
                    if (partners.find(p => p.email === formData.email)) {
                        showMessage('error', 'This email is already registered. Please login instead.');
                        return;
                    }

                    // Generate unique referral code
                    const referralCode = 'REF' + Math.random().toString(36).substring(2, 8).toUpperCase();

                    const newPartner = {
                        id: 'partner_' + Date.now(),
                        ...formData,
                        referralCode: referralCode,
                        status: 'pending',
                        commissionRate: 30,
                        totalReferrals: 0,
                        totalEarnings: 0,
                        pendingPayout: 0,
                        createdAt: new Date().toISOString()
                    };

                    partners.push(newPartner);
                    localStorage.setItem('referral_partners', JSON.stringify(partners));

                    showMessage('success', 'Application submitted successfully! We will review your application and notify you via email within 24 hours.');
                    document.getElementById('applyForm').reset();
                    document.getElementById('passwordStrength').classList.remove('strength-weak', 'strength-medium', 'strength-strong');
                    document.getElementById('strengthText').textContent = '';
                } else {
                    // Real API call
                    const response = await fetch(REFERRAL_API_URL, {
                        method: 'POST',
                        redirect: 'follow',
                        body: JSON.stringify({ action: 'apply', ...formData })
                    });

                    const result = await response.json();

                    if (result.success) {
                        showMessage('success', 'Application submitted successfully! We will review your application and notify you via email within 24 hours.');
                        document.getElementById('applyForm').reset();
                    } else {
                        showMessage('error', result.error || 'Something went wrong. Please try again.');
                    }
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('error', 'Network error. Please check your connection and try again.');
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = 'Submit Application';
                btnSpinner.style.display = 'none';
            }
        }
    </script>
</body>
</html>
